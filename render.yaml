# Render Blueprint — monorepo: build frontend + run Express API (serves SPA from frontend/dist)
# Root Directory in Render dashboard must be "." (repo root) OR "backend" (backend/package.json build builds ../frontend).
services:
  - type: web
    name: sentinal-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
