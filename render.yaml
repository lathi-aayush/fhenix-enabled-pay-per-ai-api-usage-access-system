# Render Blueprint: one Web Service serves the Vite build + Express API (same origin).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: sentinel
    runtime: node
    plan: free
    buildCommand: npm install --prefix frontend && NODE_OPTIONS=--max-old-space-size=4096 npm run build --prefix frontend && npm install --prefix backend
    startCommand: NODE_ENV=production node backend/src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: TREASURY_WALLET
        sync: false
      - key: ALGORAND_NODE
        value: "https://testnet-api.algonode.cloud"
      - key: ALGORAND_INDEXER
        value: "https://testnet-idx.algonode.cloud"

  - type: web
    name: sentinel-chat-api
    runtime: node
    plan: free
    buildCommand: npm install --prefix chatbot/chat-backend
    startCommand: node chatbot/chat-backend/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MONGO_URI
        sync: false
      # Must match the JWT_SECRET of the main sentinel backend (set manually in Render dashboard)
      - key: JWT_SECRET
        sync: false
      # URL of the main Sentinel backend - CRITICAL, must be set or all calls fail
      - key: SENTINAL_API_URL
        value: "https://sentinal-j4ox.onrender.com"
      - key: GROQ_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: COST_PER_REQUEST
        value: "0.01"
      - key: ALGORAND_NODE
        value: "https://testnet-api.algonode.cloud"
      - key: ALGORAND_INDEXER
        value: "https://testnet-idx.algonode.cloud"
      - key: TREASURY_WALLET
        sync: false
      - key: FRONTEND_URL
        value: "https://chat-front-blond.vercel.app"
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: DEV_ADMIN_SECRET
        sync: false
